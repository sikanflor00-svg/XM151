<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Shop</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="header">
      <a href="index.html">
        <img id="SKYNET" src="images/SKYNET.gif" />
      </a>
      <h5>SKYNET</h5>

      <div id="menu">
        <!-- TODO: Copy to other pages' header -->
        <div id="menu-item-1">
          <button id="menu-btn" onclick="toggleMenu()">Menu ▾</button>
          <div id="dropdown" style="display: none">
            <a href="index.html">Home</a>
            <a href="login.html">Logout</a>
          </div>
        </div>
        <div id="menu-item-2">
          <a id="cart" href="cart.html">
            <div id="cartCount">0</div>
            <img id="cartIcon" src="images/cart.png" />
          </a>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="products" id="products"></div>
    </div>

    <footer>© 2026 My Shop</footer>

    <script>
      let cart = 0;

      function addToCart() {
        cart++;
        document.getElementById("cartCount").innerText = cart;
      }

      function toggleMenu() {
        const dropdown = document.getElementById("dropdown");
        const menuBtn = document.getElementById("menu-btn");

        if (dropdown.style.display === "block") {
          dropdown.style.display = "none";
          menuBtn.innerHTML = "Menu ▾";
        } else {
          dropdown.style.display = "block";
          menuBtn.innerHTML = "Menu ▴";
        }
      }
      
      function renderProducts() {
        const products = [
          {
            id: 1,
            name: "Posa",
            price: 49,
            image: "images/posa.jpg",
            link: "products/posa.html",
          },
          {
            id: 2,
            name: "Niggie Delight",
            price: 99,
            image: "images/incelwojak.gif",
            link: "products/master-posa.html",
          },
          {
            id: 3,
            name: "Wireless Mouse",
            price: 25,
            image: "images/RealMouse.webp",
            link: "products/wireless-mouse.html",
          },
          {
            id: 4,
            name: "Keyboard",
            price: 59,
            image: "images/superkeyboard5000.gif",
            link: "products/SuperKeyboard.html",
          },
          {
            id: 5,
            name: "Gaming Chair",
            price: 199,
            image: "images/supergamingchair.gif",
            link: "products/ultimateGamingChair.html",
          },
          {
            id: 6,
            name: "USB Microphone",
            price: 79,
            image: "images/giphy.gif",
            link: "products/mikerapon.html",
          },
        ];

        const productsContainer = document.getElementById("products");

        for (let i = 0; i < products.length; i++) {
          const product = products[i];

          const productCard = document.createElement("div");

          productCard.innerHTML = `
              <div class="card">
                <a href="${product.link}">
                  <img src="${product.image}"/>
                  <h3>${product.name}</h3>
                </a>
                <div class="price">$99</div>
                <button onclick="addToCart()">Add to Cart</button>
              </div>
            `;

          productsContainer.appendChild(productCard);
        }
      }

      renderProducts();
    </script>
  </body>
</html>
