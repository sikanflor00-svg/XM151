<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Shop</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="header">
      <a href="index.html">
        <img id="SKYNET" src="images/SKYNET.gif" />
      </a>
      <h5 id="SKYNET">SKYNET</h5>

      <div id="menu">
        // TODO: Copy to other pages' header
        <div id="menu-item-1">
          <button id="menu-btn" onclick="toggleMenu()">Menu ▾</button>
          <div id="dropdown">
            <a href="index.html">Home</a>
            <a href="login.html">Logout</a>
          </div>
        </div>
        <div id="menu-item-2">
          <a id="cart" href="cart.html">
            <div id="cartCount">0</div>
            <img id="cartIcon" src="images/cart.png" />
          </a>
        </div>
      </div>
    </div>
    <div class="container">
      <div class="products">
        <div class="card">
          <a href="products/posa.html">
            <img src="images/posa.jpg" />
            <h3>Posa</h3>
          </a>
          <div class="price">$49</div>
          <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="card">
          <a href="products/master-posa.html">
            <img src="images/incelwojak.gif" />
            <h3>Niggie Delight</h3>
          </a>
          <div class="price">$99</div>
          <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="card">
          <a href="products/wireless-mouse.html">
            <img src="images/RealMouse.webp" />
            <h3>Wireless Mouse</h3>
          </a>
          <div class="price">$25</div>
          <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="card">
          <a href="products/SuperKeyboard.html">
            <img src="images/superkeyboard5000.gif" />
            <h3>Keyboard</h3>
          </a>
          <div class="price">$59</div>
          <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="card">
          <a href="products/ultimateGamingChair.html">
            <img src="images/supergamingchair.gif" />
            <h3>Gaming Chair</h3>
          </a>
          <div class="price">$199</div>
          <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="card">
          <a href="products/mikerapon.html">
            <img src="images/giphy.gif" />
            <h3>USB Microphone</h3>
          </a>
          <div class="price">$79</div>
          <button onclick="addToCart()">Add to Cart</button>
        </div>
      </div>
    </div>

    <footer>© 2026 My Shop</footer>

    <script>
      let cart = 0;

      function addToCart() {
        cart++;
        document.getElementById("cartCount").innerText = cart;
      }

      // TODO: Javascript reference
      function toggleMenu() {
        // dropdown element <div id="dropdown">
        const dropdown = document.getElementById("dropdown");
        const menuBtn = document.getElementById("menu-btn");

        // If the dropdown is visible, hide it. Otherwise, show it.
        if (dropdown.style.display == "block") {
          dropdown.style.display = "none";
          menuBtn.innerHTML = "Menu ▾ ";
        } else {
          dropdown.style.display = "block";
          menuBtn.innerHTML = "Menu ▴";
        }
      }
    </script>
  </body>
</html>
