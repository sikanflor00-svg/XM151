<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Shop</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-image:url("images/BGimg.jpg") ;
      }

      header {
        background: #525151;
        color: white;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .cart {
        background: #ff6b6b;
        padding: 6px 12px;
        border-radius: 20px;
      }

      .container {
        max-width: 1200px;
        margin: auto;
        padding: 30px;
      }

      .products {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
      }

      .card {
        background: white;
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      .card img {
        width: 200px;
        height: 150px;
        object-fit: cover;
        border-radius: 8px;
      }

      .price {
        font-size: 18px;
        font-weight: bold;
        margin: 10px 0;
      }

      button {
        background: #4caf50;
        border: none;
        padding: 10px 15px;
        color: white;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        background: #3e8e41;
      }

      footer {
        text-align: center;
        padding: 20px;
        color: #666;
      }
      #cartCount {
        background-color: red;
        color: white;
        border-radius: 100px;
        width: 20px;
        text-align: center;
        padding: 2px;
        margin-top: -10px;
        margin-left: 20px;
        position: absolute;
      }
      #cartIcon {
        width: 30px;
      }
      #cart {
        margin-right: 100px;
      }
      #header {
        background: #525151;
        width: 100%;
        color: white;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #companyLogo {
        width: 50px;
      }
      
    </style>
  </head>
  <body>
    <div id="header">
      <a href="index.html">
        <img id="companyLogo" src="images/company-logo.jpg" />
      </a>
      <h5 id="companyName">My company</h5>
      <a href="cart.html">
        <div id="cart">
          <div id="cartCount">0</div>
          <img id="cartIcon" src="images/cart.png" />
        </div>
      </a>
    </div>
    <div class="container">
      <div class="products">
        <div class="card">
          <a href="products/posa.html">
            <img src="images/posa.jpg" />
            <h3>Posa</h3>
          </a>
          <div class="price">$49</div>
          <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="card">
          <a href="products/master-posa.html">
            <img src="https://picsum.photos/300/200?2" />
            <h3>Smart Watch</h3>
          </a>
          <div class="price">$99</div>
          <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="card">
          <a href="products/wireless-mouse.html">
            <img src="images/wireless-mouse.jpg" />
            <h3>Wireless Mouse</h3>
          </a>
          <div class="price">$25</div>
          <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="card">
          <a href="products/SuperKeyboard.html">
            <img src="images/superkeyboard5000.gif" />
            <h3>Keyboard</h3>
          </a>
          <div class="price">$59</div>
          <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="card">
          <a href="products/ultimateGamingChair.html">
            <img src="images/supergamingchair.gif" />
            <h3>Gaming Chair</h3>
          </a>
          <div class="price">$199</div>
          <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="card">
          <img
            src="https://api.silverlunah.com/images/27288f4d-82df-45f5-a022-e42b3713f3c9.png"
          />
          <h3>USB Microphone</h3>
          <div class="price">$79</div>
          <button onclick="addToCart()">Add to Cart</button>
        </div>
      </div>
    </div>

    <footer>© 2026 My Shop</footer>

    <script>
      let cart = 0;

      function addToCart() {
        cart++;
        document.getElementById("cartCount").innerText = cart;
      }
    </script>
  </body>
</html>
