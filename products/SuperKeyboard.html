<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ultimate Gaming Keyboard</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div id="header">
      <a href="../index.html">
        <img id="SKYNET" src="../images/SKYNET.gif" />
      </a>
      <h5>SKYNET</h5>

      <div id="menu">
        <div id="menu-item-1">
          <button id="menu-btn" onclick="toggleMenu()">Menu ▾</button>
          <div id="dropdown" style="display: none">
            <a href="../index.html">Home</a>
            <a href="../login.html">Logout</a>
          </div>
        </div>
        <div id="menu-item-2">
          <a id="cart" href="../cart.html">
            <div id="cartCount">0</div>
            <img id="cartIcon" src="../images/cart.png" />
          </a>
        </div>
      </div>
    </div>

    <div id="content">
      
    </div>

    <footer>© 2026 My Shop</footer>

    <script>
      let cart = 0;

      function addToCart() {
        cart++;
        document.getElementById("cartCount").innerText = cart;
      }

      function renderProduct() {
        const product = {
          id: 1,
          name: "Ultimate Gaming Keyboard",
          price: 149.99,
          image: "../images/Ultimate Keyboard.webp",
          description: "Experience the ultimate gaming performance with our Ultimate Gaming Keyboard, featuring customizable RGB lighting, mechanical switches for precise keystrokes, and a sleek ergonomic design for maximum comfort during long gaming sessions.",
        };

        const content = document.getElementById("content");
        const productElement = document.createElement("div");
        productElement.className = "product-detail";
        content.appendChild(productElement);

        productElement.innerHTML = `
          <img id="product-image" src="${product.image}" />
          <h3>${product.name}</h3>
          <div class="price">$${product.price.toFixed(2)}</div>
          <p>${product.description}</p>
          <button onclick="addToCart()">Add to Cart</button>
        `;
      }

      function toggleMenu() {
        const dropdown = document.getElementById("dropdown");
        const menuBtn = document.getElementById("menu-btn");

        if (dropdown.style.display === "block") {
          dropdown.style.display = "none";
          menuBtn.innerHTML = "Menu ▾";
        } else {
          dropdown.style.display = "block";
          menuBtn.innerHTML = "Menu ▴";
        }
      }
      renderProduct();
    </script>
  </body>
</html>
