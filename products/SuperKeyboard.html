<html>
  <head>
    <title>Product Specifications</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div id="header">
      <a href="../index.html">
        <img id="SKYNET" src="../images/SKYNET.gif" />
      </a>
      <h5 id="company-name">My company</h5>
      <a href="../cart.html">
        <div id="cart">
          <div id="cartCount">0</div>
          <img id="cartIcon" src="../images/cart.png" />
        </div>
      </a>
    </div>
    <div id="content">
      <img id="product-image" src="../images/Ultimate Keyboard.webp" />
      <h1>Ultimate Keyboard</h1>
      <p>Behold The Ultimate Keyboard pahirapan nyu sarili nyu</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>
    <script>
      let cart = 0;

      function addToCart() {
        if (cart == 10) {
          return;
        }
        cart = cart + 2;
        document.getElementById("cartCount").innerText = cart;
      }

       function toggleMenu() {
        const dropdown = document.getElementById("dropdown");
        const menuBtn = document.getElementById("menu-btn");

        if (dropdown.style.display === "block") {
          dropdown.style.display = "none";
          menuBtn.innerHTML = "Menu ▾";
        } else {
          dropdown.style.display = "block";
          menuBtn.innerHTML = ">Menu ▴";
        }
      }
    </script>
  </body>
</html>
