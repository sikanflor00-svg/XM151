<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wireless Mouse</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div id="header">
      <a href="../index.html">
        <img id="SKYNET" src="../images/SKYNET.gif" />
      </a>
      <h5>SKYNET</h5>

      <div id="menu">
        <div id="menu-item-1">
          <button id="menu-btn" onclick="toggleMenu()">Menu ▾</button>
          <div id="dropdown" style="display: none">
            <a href="../index.html">Home</a>
            <a href="../login.html">Logout</a>
          </div>
        </div>
        <div id="menu-item-2">
          <a id="cart" href="../cart.html">
            <div id="cartCount">0</div>
            <img id="cartIcon" src="../images/cart.png" />
          </a>
        </div>
      </div>
    </div>

    <div id="content">
      <img src="../images/RealMouse.webp" alt="Wireless Mouse" />
      <h3>Wireless Mouse</h3>
      <div class="price">$25</div>
      <p>High precision wireless mouse with ergonomic design and long battery life.</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

    <footer>© 2026 My Shop</footer>

    <script>
      let cart = 0;

      function addToCart() {
        cart++;
        document.getElementById("cartCount").innerText = cart;
      }

      function toggleMenu() {
        const dropdown = document.getElementById("dropdown");
        const menuBtn = document.getElementById("menu-btn");

        if (dropdown.style.display === "block") {
          dropdown.style.display = "none";
          menuBtn.innerHTML = "Menu ▾";
        } else {
          dropdown.style.display = "block";
          menuBtn.innerHTML = ">Menu ▴";
        }
      }
    </script>
  </body>
</html>
