<html>
  <head>
    <title>GamingChairNiLola</title>
    <link rel="stylesheet" href="../style.css" />

    <body>
      <div id="header">
        <a href="../cart.html">
          <img id="SKYNET" src="../images/SKYNET.gif" />
        </a>
        <h5 id="companyName">My company</h5>
        <a href="../cart.html">
          <div id="cart">
            <div id="cartCount">0</div>
            <img id="cartIcon" src="../images/cart.png" />
          </div>
        </a>
      </div>
      <div id="content">
        <img id="product-image" src="../images/ultimatexperience.webp" />
        <h1>The Ultimate Experience Gaming Chair</h1>
        <p>
          Beat The Game With the Ultimate Gaming Chair<br />
          Experience the Ultimate Comfort Peak Performace
        </p>
        <button onclick="addToCart()">Add to Cart</button>
      </div>
      <script>
        let cart = 0;

        function addToCart() {
          if (cart == 10) {
            return;
          }
          cart = cart + 2;
          document.getElementById("cartCount").innerText = cart;
        }
      </script>
    </body>
  </head>
</html>
